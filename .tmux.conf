# Strong defaults for keyboard-driven terminal work.
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g renumber-windows on
set -g detach-on-destroy off
set -g focus-events on
set -g set-clipboard on

# Faster escape handling and a simpler prefix.
set -sg escape-time 10
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Better splits and window creation.
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane movement.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes quickly.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Keep the status line readable.
set -g status-position top
set -g status-style "bg=colour235,fg=colour252"
set -g status-left-length 30
set -g status-right-length 80
set -g status-left "#[fg=colour81,bold] #S "
set -g status-right "#[fg=colour247]%Y-%m-%d #[fg=colour110]%H:%M "
